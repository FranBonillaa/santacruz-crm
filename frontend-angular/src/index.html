<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <title>Maria Fornet Centro de Estetica | Sevilla</title>
  <link rel="icon" type="image/png" href="logo_circular.png">
  <meta name="description"
    content="Centro de Estetica en Sevilla. Tratamientos faciales, corporales, depilación y más. Pide tu cita con Maria Fornet.">
  <meta property="og:title" content="María Fornet Centro de Estética | Sevilla">
  <meta property="og:description"
    content="Centro de estética en Sevilla. Tratamientos faciales, corporales, manicura, depilación y más. Pide tu cita.">
  <meta property="og:image" content="logo.png">
  <meta property="og:type" content="website">
  <meta name="keywords"
    content="centro de estética Sevilla, manicura Sevilla, tratamientos faciales Sevilla, depilación Sevilla, INDIBA Sevilla, María Fornet">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="splash"
    style="position:fixed;inset:0;background:#F7F2EA;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s ease">
    <div style="text-align:center">
      <p style="font-family:'Playfair Display',serif;font-size:1.5rem;color:#2C2C2C;letter-spacing:0.05em;">María Fornet
      </p>
      <p style="font-family:Lato,sans-serif;font-size:0.7rem;color:#B8965A;letter-spacing:0.3em;margin-top:4px;">CENTRO
        DE ESTÉTICA</p>
    </div>
  </div>
  <app-root></app-root>
  <script>
    window.addEventListener('load', () => {
      const splash = document.getElementById('splash');
      setTimeout(() => {
        splash.style.opacity = '0';
        setTimeout(() => splash.remove(), 400);
      }, 300);
    });
  </script>
</body>

</html>
